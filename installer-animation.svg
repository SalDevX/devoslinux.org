<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
<defs>
<style>
  @keyframes s1-kf{0%{opacity:1}22%{opacity:1}25%{opacity:0}100%{opacity:0}}
  @keyframes s2-kf{0%,25%{opacity:0}28%{opacity:1}47%{opacity:1}50%{opacity:0}100%{opacity:0}}
  @keyframes s3-kf{0%,50%{opacity:0}53%{opacity:1}72%{opacity:1}75%{opacity:0}100%{opacity:0}}
  @keyframes s4-kf{0%,75%{opacity:0}78%{opacity:1}97%{opacity:1}100%{opacity:0}}
  @keyframes d1-kf{0%{fill:#1793d1}22%{fill:#1793d1}25%{fill:#242424}100%{fill:#242424}}
  @keyframes d2-kf{0%,25%{fill:#242424}28%{fill:#1793d1}47%{fill:#1793d1}50%{fill:#242424}100%{fill:#242424}}
  @keyframes d3-kf{0%,50%{fill:#242424}53%{fill:#1793d1}72%{fill:#1793d1}75%{fill:#242424}100%{fill:#242424}}
  @keyframes d4-kf{0%,75%{fill:#242424}78%{fill:#1793d1}97%{fill:#1793d1}100%{fill:#242424}}
  @keyframes pb-kf{0%,75%{transform:scaleX(0)}78%{transform:scaleX(0.04)}97%{transform:scaleX(1)}100%{transform:scaleX(0)}}
  #s1{animation:s1-kf 20s ease-in-out infinite}
  #s2{animation:s2-kf 20s ease-in-out infinite}
  #s3{animation:s3-kf 20s ease-in-out infinite}
  #s4{animation:s4-kf 20s ease-in-out infinite}
  #d1{animation:d1-kf 20s infinite}
  #d2{animation:d2-kf 20s infinite}
  #d3{animation:d3-kf 20s infinite}
  #d4{animation:d4-kf 20s infinite}
  #pbar{transform-origin:236px 216px;animation:pb-kf 20s linear infinite}
</style>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="6" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="glow2" x="-10%" y="-10%" width="120%" height="120%">
  <feGaussianBlur stdDeviation="3" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1793d1" flood-opacity="0.18"/>
</filter>
<linearGradient id="blue-grd" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#1793d1"/>
  <stop offset="100%" stop-color="#0e6fa8"/>
</linearGradient>
<linearGradient id="bg-grd" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#141414"/>
  <stop offset="100%" stop-color="#0d0d0d"/>
</linearGradient>
<linearGradient id="fade-down" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#0d0d0d" stop-opacity="0"/>
  <stop offset="100%" stop-color="#0d0d0d" stop-opacity="1"/>
</linearGradient>
<clipPath id="prog-clip">
  <rect x="236" y="210" width="548" height="16" rx="8"/>
</clipPath>
</defs>

<!-- Window -->
<rect width="900" height="520" rx="14" fill="#090909" filter="url(#shadow)"/>

<!-- Title bar -->
<rect width="900" height="40" rx="14" fill="#161616"/>
<rect y="26" width="900" height="14" fill="#161616"/>
<circle cx="20" cy="20" r="7" fill="#ff5f57"/>
<circle cx="42" cy="20" r="7" fill="#ffbd2e"/>
<circle cx="64" cy="20" r="7" fill="#28ca41"/>
<text x="450" y="25" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#555">DevOS Installer</text>

<!-- Sidebar background -->
<rect x="0" y="40" width="200" height="480" fill="#0b0b0b"/>
<line x1="200" y1="40" x2="200" y2="520" stroke="#1d1d1d" stroke-width="1"/>

<!-- Logo -->
<text x="100" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="800" filter="url(#glow)"><tspan fill="#1793d1">Dev</tspan><tspan fill="#efefef">OS</tspan></text>
<text x="100" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#484848" letter-spacing="2">ROLLING RELEASE</text>
<line x1="24" y1="120" x2="176" y2="120" stroke="#1d1d1d" stroke-width="1"/>

<!-- Step connector -->
<line x1="38" y1="165" x2="38" y2="375" stroke="#1c1c1c" stroke-width="2" stroke-dasharray="4 4"/>

<!-- Step 1 -->
<circle id="d1" cx="38" cy="165" r="11" fill="#1793d1"/>
<text x="38" y="169" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="white" font-weight="bold">1</text>
<text x="58" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#d0d0d0">Welcome</text>

<!-- Step 2 -->
<circle id="d2" cx="38" cy="235" r="11" fill="#242424"/>
<text x="38" y="239" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#777" font-weight="bold">2</text>
<text x="58" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#555">Partitions</text>

<!-- Step 3 -->
<circle id="d3" cx="38" cy="305" r="11" fill="#242424"/>
<text x="38" y="309" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#777" font-weight="bold">3</text>
<text x="58" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#555">Users</text>

<!-- Step 4 -->
<circle id="d4" cx="38" cy="375" r="11" fill="#242424"/>
<text x="38" y="379" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#777" font-weight="bold">4</text>
<text x="58" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#555">Install</text>

<!-- Sidebar footer -->
<text x="100" y="506" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#2e2e2e">archiso · calamares · linux-lts</text>

<!-- Content area -->
<rect x="200" y="40" width="700" height="480" fill="url(#bg-grd)"/>

<!-- ═══════════════ SCREEN 1 — WELCOME ═══════════════ -->
<g id="s1">
<!-- Decorative rings -->
<circle cx="550" cy="255" r="220" fill="none" stroke="#1793d1" stroke-width="0.4" opacity="0.06"/>
<circle cx="550" cy="255" r="170" fill="none" stroke="#1793d1" stroke-width="0.4" opacity="0.08"/>
<circle cx="550" cy="255" r="120" fill="none" stroke="#1793d1" stroke-width="0.5" opacity="0.10"/>
<circle cx="550" cy="255" r="70"  fill="none" stroke="#1793d1" stroke-width="0.5" opacity="0.12"/>

<!-- Hero logo -->
<text x="550" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" filter="url(#glow)"><tspan fill="#1793d1">Dev</tspan><tspan fill="#ffffff">OS</tspan></text>
<text x="550" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#606060" letter-spacing="4">ARCH LINUX · XFCE · LTS KERNEL</text>

<!-- Divider -->
<line x1="400" y1="216" x2="700" y2="216" stroke="#222" stroke-width="1"/>

<!-- Tagline -->
<text x="550" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#aaa">Your developer workstation, cloned from a golden system.</text>

<!-- Chips -->
<rect x="296" y="258" width="88" height="26" rx="13" fill="#1793d10f" stroke="#1793d138" stroke-width="1"/>
<text x="340" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">linux-lts</text>
<rect x="394" y="258" width="72" height="26" rx="13" fill="#1793d10f" stroke="#1793d138" stroke-width="1"/>
<text x="430" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">XFCE 4</text>
<rect x="476" y="258" width="90" height="26" rx="13" fill="#1793d10f" stroke="#1793d138" stroke-width="1"/>
<text x="521" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">470+ pkgs</text>
<rect x="576" y="258" width="96" height="26" rx="13" fill="#1793d10f" stroke="#1793d138" stroke-width="1"/>
<text x="624" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">MacBook ✓</text>

<!-- CTA -->
<rect x="430" y="306" width="240" height="48" rx="10" fill="url(#blue-grd)" filter="url(#glow2)"/>
<text x="550" y="335" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="white">Start Installation →</text>

<text x="550" y="408" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3a3a3a">Back up your data before continuing. Installation will erase the selected disk.</text>
</g>

<!-- ═══════════════ SCREEN 2 — PARTITIONS ═══════════════ -->
<g id="s2">
<text x="550" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#ececec">Disk Partitioning</text>
<text x="550" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#777">Apple SSD — 500 GB · GPT · UEFI</text>

<!-- Disk bar -->
<rect x="220" y="130" width="660" height="54" rx="8" fill="#181818" stroke="#242424"/>
<!-- ESP -->
<rect x="220" y="130" width="48" height="54" rx="8" fill="#ffbd2e" opacity="0.78"/>
<text x="244" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a">ESP</text>
<!-- Root -->
<rect x="268" y="130" width="280" height="54" fill="#1793d1" opacity="0.72"/>
<text x="408" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">/root · 120 GB · ext4</text>
<!-- Home -->
<rect x="548" y="130" width="332" height="54" rx="8" fill="#1793d1" opacity="0.26"/>
<text x="714" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#aaa">/home · 379 GB · ext4</text>

<!-- Info cards row -->
<rect x="220" y="202" width="204" height="90" rx="8" fill="#141414" stroke="#1f1f1f"/>
<text x="234" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#555">Bootloader</text>
<text x="234" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">systemd-boot</text>
<text x="234" y="268" font-family="system-ui,sans-serif" font-size="11" fill="#555">ESP: 512 MiB · vfat</text>

<rect x="436" y="202" width="204" height="90" rx="8" fill="#141414" stroke="#1f1f1f"/>
<text x="450" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#555">Filesystem</text>
<text x="450" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">ext4</text>
<text x="450" y="268" font-family="system-ui,sans-serif" font-size="11" fill="#555">Swap: none (tmpfs 6G)</text>

<rect x="652" y="202" width="208" height="90" rx="8" fill="#141414" stroke="#1f1f1f"/>
<text x="666" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#555">Mode</text>
<text x="666" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">Erase disk</text>
<text x="666" y="268" font-family="system-ui,sans-serif" font-size="11" fill="#555">Table: GPT</text>

<!-- Warning -->
<rect x="220" y="306" width="640" height="36" rx="8" fill="#ffbd2e0a" stroke="#ffbd2e38" stroke-width="1"/>
<text x="540" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#ffbd2e">⚠  All data on the selected disk will be permanently erased. Ensure you have a backup.</text>

<!-- Mode selectors -->
<rect x="220" y="356" width="298" height="50" rx="8" fill="#1793d10e" stroke="#1793d1" stroke-width="1.5"/>
<circle cx="240" cy="381" r="8" fill="#1793d1"/>
<circle cx="240" cy="381" r="3" fill="white"/>
<text x="256" y="386" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#ececec">Erase disk and install</text>

<rect x="530" y="356" width="298" height="50" rx="8" fill="#141414" stroke="#252525"/>
<circle cx="550" cy="381" r="8" fill="none" stroke="#444" stroke-width="1.5"/>
<text x="566" y="386" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#555">Manual partitioning</text>

<!-- Next button -->
<rect x="750" y="428" width="110" height="38" rx="8" fill="url(#blue-grd)"/>
<text x="805" y="451" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">Next →</text>
</g>

<!-- ═══════════════ SCREEN 3 — USERS ═══════════════ -->
<g id="s3">
<text x="550" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#ececec">Create User Account</text>
<text x="550" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#777">Primary user for your DevOS system</text>

<!-- Avatar -->
<circle cx="316" cy="218" r="56" fill="#141414" stroke="#1f1f1f" stroke-width="2"/>
<text x="316" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" fill="#333">◉</text>

<!-- Full name -->
<text x="416" y="158" font-family="system-ui,sans-serif" font-size="11" fill="#555">Full name</text>
<rect x="416" y="164" width="344" height="36" rx="6" fill="#141414" stroke="#252525"/>
<text x="432" y="187" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#ccc">Developer</text>
<rect x="498" y="168" width="1.5" height="24" fill="#1793d1">
  <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
</rect>

<!-- Username -->
<text x="416" y="218" font-family="system-ui,sans-serif" font-size="11" fill="#555">Username</text>
<rect x="416" y="224" width="344" height="36" rx="6" fill="#141414" stroke="#252525"/>
<text x="432" y="247" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#ccc">user</text>

<!-- Password -->
<text x="416" y="278" font-family="system-ui,sans-serif" font-size="11" fill="#555">Password</text>
<rect x="416" y="284" width="344" height="36" rx="6" fill="#141414" stroke="#1793d1" stroke-width="1.5"/>
<text x="432" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#666">●  ●  ●  ●  ●  ●  ●  ●</text>

<!-- Confirm -->
<text x="416" y="338" font-family="system-ui,sans-serif" font-size="11" fill="#555">Confirm password</text>
<rect x="416" y="344" width="344" height="36" rx="6" fill="#141414" stroke="#252525"/>
<text x="432" y="367" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#666">●  ●  ●  ●  ●  ●  ●  ●</text>

<!-- Chips -->
<rect x="220" y="406" width="118" height="26" rx="13" fill="#1793d10f" stroke="#1793d138"/>
<text x="279" y="423" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">shell: zsh</text>
<rect x="348" y="406" width="130" height="26" rx="13" fill="#1793d10f" stroke="#1793d138"/>
<text x="413" y="423" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">groups: wheel</text>
<rect x="488" y="406" width="136" height="26" rx="13" fill="#1793d10f" stroke="#1793d138"/>
<text x="556" y="423" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1793d1">sudo: enabled</text>

<!-- Next button -->
<rect x="750" y="428" width="110" height="38" rx="8" fill="url(#blue-grd)"/>
<text x="805" y="451" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">Next →</text>
</g>

<!-- ═══════════════ SCREEN 4 — INSTALLING ═══════════════ -->
<g id="s4">
<text x="550" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#ececec">Installing DevOS</text>
<text x="550" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#777">Setting up your system. This will take a few minutes.</text>

<!-- Brand -->
<text x="550" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="60" font-weight="800" filter="url(#glow)"><tspan fill="#1793d1">Dev</tspan><tspan fill="white">OS</tspan></text>

<!-- Progress track -->
<rect x="236" y="210" width="548" height="16" rx="8" fill="#181818" stroke="#1f1f1f"/>
<!-- Animated fill -->
<rect id="pbar" x="236" y="210" width="548" height="16" rx="8" fill="url(#blue-grd)" clip-path="url(#prog-clip)"/>
<text x="550" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444">Installing packages from devos-local repo...</text>

<!-- Terminal window -->
<rect x="220" y="262" width="560" height="200" rx="8" fill="#080808" stroke="#1c1c1c"/>
<!-- Terminal bar -->
<rect x="220" y="262" width="560" height="26" rx="8" fill="#141414"/>
<rect x="220" y="276" width="560" height="12" fill="#141414"/>
<circle cx="236" cy="275" r="5" fill="#ff5f57" opacity="0.55"/>
<circle cx="252" cy="275" r="5" fill="#ffbd2e" opacity="0.55"/>
<circle cx="268" cy="275" r="5" fill="#28ca41" opacity="0.55"/>
<text x="550" y="279" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#444">install.log</text>

<text x="236" y="308" font-family="'SF Mono',monospace" font-size="10" fill="#444">:: Running pacstrap -K /mnt...</text>
<text x="236" y="324" font-family="'SF Mono',monospace" font-size="10" fill="#444">:: Synchronizing package databases...</text>
<text x="236" y="340" font-family="'SF Mono',monospace" font-size="10" fill="#666">installing base (2024.07.01-1)...</text>
<text x="236" y="356" font-family="'SF Mono',monospace" font-size="10" fill="#666">installing linux-lts (6.12.91-1)...</text>
<text x="236" y="372" font-family="'SF Mono',monospace" font-size="10" fill="#777">installing intel-ucode (20240531-1)...</text>
<text x="236" y="388" font-family="'SF Mono',monospace" font-size="10" fill="#999">installing xfce4 (4.18.3-1)...</text>
<text x="236" y="404" font-family="'SF Mono',monospace" font-size="10" fill="#1793d1">installing brave-bin (1.90.0-1)...</text>
<text x="236" y="420" font-family="'SF Mono',monospace" font-size="10" fill="#1793d1">▶  devos-firstboot.service enabled</text>
<!-- Fade overlay -->
<rect x="220" y="416" width="560" height="46" fill="url(#fade-down)" rx="8"/>
</g>

</svg>
